<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login ──────────────────────────────────────────────── */
    #login-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
    }

    #login-view h1 { font-size: 1.4rem; color: #7ec8e3; }

    #login-view input {
      padding: 8px 12px;
      font-family: inherit;
      font-size: 1rem;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 4px;
      width: 240px;
    }

    #login-view button {
      padding: 8px 24px;
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }

    #login-view button:disabled { opacity: 0.5; cursor: default; }

    #login-error { color: #f87171; font-size: 0.85rem; }

    /* ── Chat ───────────────────────────────────────────────── */
    #chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* top bar */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #topbar .user-badge {
      background: #1f6feb;
      color: #fff;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.8rem;
    }

    #topbar .spacer { flex: 1; }

    #topbar button {
      padding: 4px 12px;
      font-family: inherit;
      font-size: 0.8rem;
      border-radius: 4px;
      border: 1px solid #555;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
    }

    #topbar button:hover { background: #2a2a2a; }

    #end-session-btn { border-color: #f87171 !important; color: #f87171 !important; }

    /* messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 6px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }

    .msg.user {
      align-self: flex-end;
      background: #1f3a5f;
      border: 1px solid #1f6feb;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }

    .msg.system {
      align-self: center;
      color: #888;
      font-size: 0.78rem;
      border: none;
      background: transparent;
    }

    .msg.error {
      align-self: flex-start;
      background: #2a1111;
      border: 1px solid #f87171;
      color: #f87171;
    }

    /* input row */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid #2a2a2a;
      background: #111;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 4px;
      resize: none;
      height: 40px;
      max-height: 120px;
      overflow-y: auto;
    }

    #msg-input:focus { outline: none; border-color: #1f6feb; }

    #send-btn {
      padding: 0 18px;
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* status panel */
    #status-panel {
      border-top: 1px solid #2a2a2a;
      background: #0a0a0a;
      font-size: 0.75rem;
      color: #777;
      flex-shrink: 0;
    }

    #status-toggle {
      padding: 4px 14px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status-toggle:hover { color: #aaa; }

    #status-body {
      display: none;
      padding: 6px 14px 10px;
      line-height: 1.7;
    }

    #status-body.open { display: block; }

    .status-row { display: flex; gap: 8px; }
    .status-key { color: #555; min-width: 90px; }
    .status-val { color: #9cdcfe; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-view">
  <h1>OpenCode Manager</h1>
  <input id="username-input" type="text" placeholder="Username" autocomplete="off" />
  <button id="login-btn">Start Session</button>
  <span id="login-error"></span>
</div>

<!-- Chat -->
<div id="chat-view">
  <div id="topbar">
    <span class="user-badge" id="user-badge">—</span>
    <span id="topbar-branch" style="font-size:0.78rem;color:#888;"></span>
    <span class="spacer"></span>
    <button id="status-toggle-btn" onclick="toggleStatus()">Status ▾</button>
    <button id="end-session-btn" onclick="endSession()">End Session</button>
  </div>

  <div id="messages"></div>

  <div id="input-row">
    <textarea id="msg-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <div id="status-panel">
    <div id="status-toggle" onclick="toggleStatus()">▸ Session Info</div>
    <div id="status-body">
      <div class="status-row"><span class="status-key">User</span><span class="status-val" id="st-user">—</span></div>
      <div class="status-row"><span class="status-key">Port</span><span class="status-val" id="st-port">—</span></div>
      <div class="status-row"><span class="status-key">Branch</span><span class="status-val" id="st-branch">—</span></div>
      <div class="status-row"><span class="status-key">Worktree</span><span class="status-val" id="st-worktree">—</span></div>
      <div class="status-row"><span class="status-key">Last active</span><span class="status-val" id="st-last">—</span></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentUser = null;
let opencodeSessionId = null;   // opencode /session id
let sseSource = null;
let statusPollInterval = null;
let currentAssistantEl = null;  // DOM element being streamed into

// ── Boot ───────────────────────────────────────────────────────────────────
(async function boot() {
  const saved = localStorage.getItem('oc_username');
  if (saved) {
    const alive = await checkSessionAlive(saved);
    if (alive) {
      currentUser = saved;
      showChat();
      return;
    }
  }
  showLogin();
})();

// ── Views ──────────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-view').style.display = 'flex';
  document.getElementById('chat-view').style.display = 'none';
}

function showChat() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';
  document.getElementById('user-badge').textContent = currentUser;
  startStatusPoll();
  connectSSE();
  appendMsg('system', `Session started as "${currentUser}"`);
}

// ── Login ──────────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const input = document.getElementById('username-input');
  const username = input.value.trim();
  if (!username) return;

  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Starting…';
  errEl.textContent = '';

  try {
    const resp = await fetch(`/api/spawn/${encodeURIComponent(username)}`, { method: 'POST' });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      throw new Error(data.detail || `HTTP ${resp.status}`);
    }
    currentUser = username;
    localStorage.setItem('oc_username', username);
    showChat();
  } catch (err) {
    errEl.textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Start Session';
  }
}

// ── Session check ──────────────────────────────────────────────────────────
async function checkSessionAlive(username) {
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) return false;
    const data = await resp.json();
    return data.sessions.some(s => s.username === username);
  } catch {
    return false;
  }
}

// ── End session ────────────────────────────────────────────────────────────
async function endSession() {
  if (!currentUser) return;
  if (!confirm(`End session for "${currentUser}"? The branch will be pushed.`)) return;

  const user = currentUser;
  _resetToLogin();

  try {
    await fetch(`/api/teardown/${encodeURIComponent(user)}`, { method: 'DELETE' });
  } catch (e) {
    console.warn('teardown error', e);
  }
}

// ── SSE ────────────────────────────────────────────────────────────────────
let _sseErrorCount = 0;

async function connectSSE() {
  if (sseSource) { sseSource.close(); }
  if (!currentUser) return;

  // Before opening EventSource, verify the session still exists on the server.
  // EventSource doesn't expose HTTP status codes so we probe first.
  const alive = await checkSessionAlive(currentUser);
  if (!alive) {
    appendMsg('system', 'Session no longer active on server. Please log in again.');
    _resetToLogin();
    return;
  }

  _sseErrorCount = 0;
  const url = `/proxy/${encodeURIComponent(currentUser)}/event`;
  sseSource = new EventSource(url);

  sseSource.onmessage = (e) => { _sseErrorCount = 0; handleSSEMessage(e); };

  sseSource.onerror = async () => {
    _sseErrorCount++;
    // After 3 consecutive errors, check if the server session is gone
    if (_sseErrorCount >= 3) {
      sseSource.close();
      sseSource = null;
      const stillAlive = await checkSessionAlive(currentUser);
      if (!stillAlive) {
        _resetToLogin();
        return;
      }
      _sseErrorCount = 0;
    }
    // Otherwise retry after a short delay
    if (currentUser) {
      setTimeout(connectSSE, 2000);
    }
  };
}

function _resetToLogin() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  clearInterval(statusPollInterval);
  currentUser = null;
  opencodeSessionId = null;
  localStorage.removeItem('oc_username');
  document.getElementById('messages').innerHTML = '';
  showLogin();
}

function handleSSEMessage(e) {
  let data;
  try {
    data = JSON.parse(e.data);
  } catch {
    return;
  }

  const type = data.type;
  const props = data.properties || {};

  // Filter to events belonging to the active opencode session
  if (props.sessionID && opencodeSessionId && props.sessionID !== opencodeSessionId) {
    return;
  }

  if (type === 'message.part.delta') {
    // Streaming text token
    if (props.field === 'text' && props.delta) {
      if (!currentAssistantEl) {
        currentAssistantEl = appendMsg('assistant', '');
      }
      currentAssistantEl.textContent += props.delta;
      scrollToBottom();
    }
  } else if (type === 'session.idle') {
    // Response finished
    currentAssistantEl = null;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').disabled = false;
    document.getElementById('msg-input').focus();
  } else if (type === 'session.status' && props.status?.type === 'idle') {
    // Fallback completion signal
    if (currentAssistantEl) {
      currentAssistantEl = null;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('msg-input').disabled = false;
      document.getElementById('msg-input').focus();
    }
  } else if (type === 'error') {
    appendMsg('error', `OpenCode error: ${JSON.stringify(props)}`);
    currentAssistantEl = null;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').disabled = false;
  }
}

// ── Send message ───────────────────────────────────────────────────────────
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  input.value = '';
  document.getElementById('send-btn').disabled = true;
  input.disabled = true;
  appendMsg('user', text);

  try {
    // Ensure we have an opencode session
    if (!opencodeSessionId) {
      const sessResp = await fetch(`/proxy/${encodeURIComponent(currentUser)}/session`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      });
      if (!sessResp.ok) throw new Error(`Failed to create session: HTTP ${sessResp.status}`);
      const sessData = await sessResp.json();
      // opencode returns the session object; adapt to whichever field it uses
      opencodeSessionId = sessData.id || sessData.sessionID || sessData.session_id;
      if (!opencodeSessionId) throw new Error('No session ID returned from opencode');
    }

    // Send message
    const msgResp = await fetch(
      `/proxy/${encodeURIComponent(currentUser)}/session/${opencodeSessionId}/message`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parts: [{ type: 'text', text }] }),
      }
    );
    if (!msgResp.ok) {
      const detail = await msgResp.text();
      throw new Error(`Message failed: HTTP ${msgResp.status} — ${detail}`);
    }
    // Response will stream via SSE — UI re-enables after message.completed
  } catch (err) {
    appendMsg('error', err.message);
    document.getElementById('send-btn').disabled = false;
    input.disabled = false;
  }
}

// ── Status panel ───────────────────────────────────────────────────────────
function toggleStatus() {
  const body = document.getElementById('status-body');
  const toggle = document.getElementById('status-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open')
    ? '▾ Session Info'
    : '▸ Session Info';
}

function startStatusPoll() {
  updateStatus();
  statusPollInterval = setInterval(updateStatus, 10_000);
}

async function updateStatus() {
  if (!currentUser) return;
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) return;
    const data = await resp.json();
    const s = data.sessions.find(x => x.username === currentUser);
    if (s) {
      document.getElementById('st-user').textContent = s.username;
      document.getElementById('st-port').textContent = s.port;
      document.getElementById('st-branch').textContent = s.branch;
      document.getElementById('st-worktree').textContent = s.worktree;
      document.getElementById('st-last').textContent = new Date(s.last_active).toLocaleTimeString();
      document.getElementById('topbar-branch').textContent = s.branch;
    }
  } catch {
    // ignore
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function appendMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
